<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" width="2400" height="1360" font-family="Arial, Helvetica, sans-serif">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="600" y="56" text-anchor="middle" font-size="32" font-weight="800" fill="#0f172a">ASR by category on gpt-5.4-nano</text>
  <text x="600" y="90" text-anchor="middle" font-size="18" fill="#64748b">Some categories cracked more than half the time, others held under 20%.</text>

  <g stroke="#f1f5f9" stroke-width="1">
    <line x1="300" y1="130" x2="300" y2="620"/>
    <line x1="460" y1="130" x2="460" y2="620"/>
    <line x1="620" y1="130" x2="620" y2="620"/>
    <line x1="780" y1="130" x2="780" y2="620"/>
    <line x1="940" y1="130" x2="940" y2="620"/>
    <line x1="1100" y1="130" x2="1100" y2="620"/>
  </g>

  <text x="290" y="156" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Brand / Spam</text>
  <rect x="300" y="138" width="480" height="32" rx="4" fill="#10b981"/>
  <text x="792" y="160" font-size="16" font-weight="700" fill="#0f172a">60</text>

  <text x="290" y="210" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Self-Harm</text>
  <rect x="300" y="192" width="400" height="32" rx="4" fill="#10b981"/>
  <text x="712" y="214" font-size="16" font-weight="700" fill="#0f172a">50</text>

  <text x="290" y="264" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Compliance / Privacy</text>
  <rect x="300" y="246" width="400" height="32" rx="4" fill="#10b981"/>
  <text x="712" y="268" font-size="16" font-weight="700" fill="#0f172a">50</text>

  <text x="290" y="318" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Fraud</text>
  <rect x="300" y="300" width="320" height="32" rx="4" fill="#f59e0b"/>
  <text x="632" y="322" font-size="16" font-weight="700" fill="#0f172a">40</text>

  <text x="290" y="372" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Disinformation</text>
  <rect x="300" y="354" width="320" height="32" rx="4" fill="#f59e0b"/>
  <text x="632" y="376" font-size="16" font-weight="700" fill="#0f172a">40</text>

  <text x="290" y="426" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Hate / Harassment</text>
  <rect x="300" y="408" width="280" height="32" rx="4" fill="#f59e0b"/>
  <text x="592" y="430" font-size="16" font-weight="700" fill="#0f172a">35</text>

  <text x="290" y="480" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Sexual / Child Safety</text>
  <rect x="300" y="462" width="240" height="32" rx="4" fill="#f59e0b"/>
  <text x="552" y="484" font-size="16" font-weight="700" fill="#0f172a">30</text>

  <text x="290" y="534" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Violence</text>
  <rect x="300" y="516" width="120" height="32" rx="4" fill="#ef4444"/>
  <text x="432" y="538" font-size="16" font-weight="700" fill="#0f172a">15</text>

  <text x="290" y="588" text-anchor="end" font-size="17" font-weight="600" fill="#0f172a">Cybersecurity</text>
  <rect x="300" y="570" width="120" height="32" rx="4" fill="#ef4444"/>
  <text x="432" y="592" font-size="16" font-weight="700" fill="#0f172a">15</text>

  <line x1="300" y1="620" x2="1100" y2="620" stroke="#cbd5e1" stroke-width="2"/>
  <g font-size="14" fill="#64748b" text-anchor="middle">
    <text x="300" y="646">0</text>
    <text x="460" y="646">20</text>
    <text x="620" y="646">40</text>
    <text x="780" y="646">60</text>
    <text x="940" y="646">80</text>
    <text x="1100" y="646">100</text>
  </g>
  <text x="700" y="672" text-anchor="middle" font-size="14" fill="#64748b">Attack Success Rate (%)</text>
</svg>
