<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" width="1440" height="760" font-family="Arial, Helvetica, sans-serif">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="360" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Three attacks, three different reasons</text>
  <text x="360" y="58" text-anchor="middle" font-size="12.5" fill="#64748b">What each tells you about your model, and what to do about it.</text>

  <text x="40" y="122" font-size="14.5" font-weight="600" fill="#0f172a">Self-harm</text>
  <text x="40" y="142" font-size="11.5" fill="#64748b">Broke because of surface framing</text>
  <rect x="260" y="113" width="110" height="36" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="280" y="121" width="70" height="20" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <rect x="460" y="113" width="190" height="36" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="555" y="136" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Test with wrapped prompts</text>

  <line x1="40" y1="178" x2="680" y2="178" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="218" font-size="14.5" font-weight="600" fill="#0f172a">Violence</text>
  <text x="40" y="238" font-size="11.5" fill="#64748b">Broke under sustained pressure</text>
  <g transform="translate(265, 207)">
    <rect x="0" y="26" width="11" height="10" rx="1" fill="#cbd5e1"/>
    <rect x="15" y="22" width="11" height="14" rx="1" fill="#cbd5e1"/>
    <rect x="30" y="17" width="11" height="19" rx="1" fill="#cbd5e1"/>
    <rect x="45" y="13" width="11" height="23" rx="1" fill="#cbd5e1"/>
    <rect x="60" y="9" width="11" height="27" rx="1" fill="#cbd5e1"/>
    <rect x="75" y="5" width="11" height="31" rx="1" fill="#cbd5e1"/>
    <rect x="90" y="0" width="11" height="36" rx="1" fill="#dc2626"/>
  </g>
  <rect x="460" y="207" width="190" height="36" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="555" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Use multi-turn tests</text>

  <line x1="40" y1="274" x2="680" y2="274" stroke="#e2e8f0" stroke-width="1"/>

  <text x="40" y="314" font-size="14.5" font-weight="600" fill="#0f172a">Cybersecurity</text>
  <text x="40" y="334" font-size="11.5" fill="#64748b">Defenses held throughout</text>
  <rect x="260" y="312" width="110" height="14" rx="3" fill="#16a34a"/>
  <rect x="460" y="303" width="190" height="36" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="555" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Regression coverage</text>
</svg>
